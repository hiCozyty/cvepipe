ludus:
  - vm_name: "{{ range_id }}-attacker-kali"
    hostname: attacker-kali
    template: kali-x64-desktop-template
    vlan: 99
    ip_last_octet: 1
    ram_gb: 4
    cpus: 2
    linux: true

  - vm_name: "{{ range_id }}-win2022"
    hostname: WIN2022-SRV
    template: win2022-server-x64-template
    vlan: 99
    ip_last_octet: 20
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: false

