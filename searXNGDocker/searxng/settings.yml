use_default_settings: true

general:
  instance_name: "Local SearXNG"
  
server:
  secret_key: "${SEARXNG_SECRET_KEY}"
  limiter: false
  
search:
  safe_search: 0
  autocomplete: ""
  formats:
    - json

outgoing:
  request_timeout: 10.0
  max_request_timeout: 30.0
  enable_http2: true

redis:
